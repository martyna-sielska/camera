name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -project CameraApp.xcodeproj \
            -scheme CameraApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/CameraApp.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create unsigned IPA
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/CameraApp.xcarchive/Products/Applications/CameraApp.app Payload/
          cp assets/frame.jpg Payload/CameraApp.app/frame.jpg
          mkdir -p Payload/CameraApp.app/assets
          cp assets/frame.jpg Payload/CameraApp.app/assets/frame.jpg
          /usr/bin/zip -r app-release.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app-release.ipa
